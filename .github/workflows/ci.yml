name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs on the same ref (e.g. quick successive pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Pinned to the version in .mise.toml for reproducible results.
          flutter-version: '3.38.6'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        # Errors and warnings fail the build (constitution: "zero errors and
        # warnings"); the pre-existing deprecation infos are not treated as fatal.
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test
